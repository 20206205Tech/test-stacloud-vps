name: trigger

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger]

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create current time file in temp
        run: |
          mkdir -p temp
          date +"%Y-%m-%d %H:%M:%S" > temp/current_time.txt

      - name: Verify file
        run: cat temp/current_time.txt

      - name: Commit and Push changes
        run: |
          # Cấu hình Git với bot account của GitHub
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Thêm file, commit và push
          git add temp/current_time.txt
          git commit -m "Update current time: $(date +'%Y-%m-%d %H:%M:%S')"
          git push