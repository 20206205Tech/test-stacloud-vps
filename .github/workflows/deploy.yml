name: Deploy to Server via SFTP

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Export requirements
        run: uv export --format requirements-txt -o requirements.txt

      - name: Deploy via SFTP
        # Sử dụng bản thay thế ổn định hơn
        uses: pressidium/sftp-deploy@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          user: ${{ secrets.SFTP_USERNAME }} # Lưu ý: key này là 'user', không phải 'username'
          pass: ${{ secrets.SFTP_PASSWORD }} # Lưu ý: key này là 'pass', không phải 'password'
          port: ${{ secrets.SFTP_PORT }}
          
          local_path: './' 
          remote_path: '/home/container/'
          
          # Cấu trúc loại trừ file
          exclude: '.git* .github* __pycache__* venv* .python-version .uv*'